<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devis | MAJARDIN</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --dark: #1B4332; --lime: #B5D51E; --white: #FFFFFF; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        
        body { background: var(--dark); color: var(--white); line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column; }

        /* HEADER IDENTIQUE SUR TOUT LE SITE */
        header { background: var(--white); padding: 12px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 5px solid var(--lime); position: sticky; top: 0; z-index: 9999; }
        .logo-img { height: 65px !important; width: auto; display: block; }
        
        nav { display: flex; gap: 20px; align-items: center; }
        nav a { text-decoration: none; color: var(--dark); font-weight: 700; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
        
        .btn-devis-nav { 
            text-decoration: none; background: var(--dark); color: var(--lime) !important; 
            width: 120px; height: 42px; display: flex; align-items: center; justify-content: center; 
            border-radius: 4px; font-weight: 900; font-size: 0.8rem; text-transform: uppercase; 
            transition: 0.3s ease-in-out; flex-shrink: 0; 
        }
        .btn-devis-nav:hover { transform: scale(1.1); background: #255a43; }

        .hamburger { display: none; font-size: 1.8rem; cursor: pointer; color: var(--dark); background: none; border: none; }

        /* SECTION DEVIS */
        section { padding: 50px 5%; flex: 1; max-width: 800px; margin: auto; width: 100%; }
        h2 { color: var(--lime); font-size: 2.5rem; text-transform: uppercase; text-align: center; margin-bottom: 30px; font-weight: 800; }
        
        .form-container { background: var(--white); color: #333; padding: 40px; border-radius: 15px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); width: 100%; }
        
        .field { margin-bottom: 20px; }
        label { font-weight: 800; font-size: 0.75rem; text-transform: uppercase; display: block; margin-bottom: 8px; color: var(--dark); }
        
        input, select, textarea { 
            width: 100% !important; 
            padding: 14px; 
            border: 1px solid #ccc; 
            border-radius: 6px; 
            font-size: 1rem; 
            display: block;
            background: #fff;
        }

        .btn-send { 
            background: var(--lime); 
            color: var(--dark); 
            font-weight: 900; 
            border: none; 
            padding: 18px; 
            width: 100%; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 1.1rem; 
            text-transform: uppercase; 
            transition: 0.3s;
        }
        .btn-send:hover { background: var(--dark); color: var(--lime); transform: translateY(-2px); }

        footer { padding: 40px; text-align: center; background: rgba(0,0,0,0.2); }

        /* MOBILE */
        @media (max-width: 1024px) {
            .hamburger { display: block; }
            nav { display: none; flex-direction: column; position: absolute; top: 100%; left: 0; width: 100%; background: white; padding: 20px; border-bottom: 5px solid var(--lime); gap: 15px; }
            nav.active { display: flex; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html"><img src="logo.png" alt="MAJARDIN" class="logo-img"></a>

    <section>
        <h2>Demande de Devis</h2>
        
        <div class="form-container">
            <form>
                <div class="field">
                    <label>Nom & Prénom</label>
                    <input type="text" placeholder="Ex: Jean Dupont" required>
                </div>
                
                <div class="field">
                    <label>Téléphone</label>
                    <input type="tel" placeholder="06 12 34 56 78" required>
                </div>

                <div class="field">
                    <label>Localisation (Pévèle & Hainaut)</label>
                    <select required>
                        <option value="">-- Choisir une ville --</option>
                        <optgroup label="Villes principales">
                            <option>Orchies</option><option>Saint-Amand-les-Eaux</option><option>Templeuve</option><option>Cysoing</option><option>Pont-à-Marcq</option>
                        </optgroup>
                        <optgroup label="Toutes les communes">
                            <option>Aix-en-Pévèle</option><option>Attiches</option><option>Auchy-lez-Orchies</option><option>Avelin</option><option>Bachy</option><option>Bersée</option><option>Bouvignies</option><option>Bousignies</option><option>Brillon</option><option>Camphin-en-Pévèle</option><option>Cappelle-en-Pévèle</option><option>Chemy</option><option>Cobrieux</option><option>Coutiches</option><option>Ennevelin</option><option>Genech</option><option>Gondecourt</option><option>Hasnon</option><option>Herrin</option><option>Landas</option><option>Lecelles</option><option>Louvil</option><option>Mérignies</option><option>Millonfosse</option><option>Moncheaux</option><option>Mons-en-Pévèle</option><option>Mouchin</option><option>Nivelle</option><option>Nomain</option><option>Ostricourt</option><option>Phalempin</option><option>Rosult</option><option>Sars-et-Rosières</option><option>Thumeries</option><option>Tilloy-lez-Marchiennes</option><option>Tourmignies</option><option>Wahagnies</option><option>Wannehain</option>
                        </optgroup>
                        <option value="autre">Autre secteur</option>
                    </select>
                </div>

                <div class="field">
                    <label>Type de prestation</label>
                    <select required>
                        <option>Création & Aménagement</option>
                        <option>Entretien annuel</option>
                        <option>Élagage & Abattage</option>
                    </select>
                </div>

                <div class="field">
                    <label>Description du projet</label>
                    <textarea rows="4" placeholder="Surface, accès, besoins spécifiques..."></textarea>
                </div>

                <button type="submit" class="btn-send">Envoyer ma demande</button>
            </form>
        </div>
    </section>

    <footer style="background: #1B4332; color: #FFFFFF; padding: 60px 10% 40px; text-align: center; margin-top: 50px; border-top: 5px solid #B5D51E;">
    <div style="margin-bottom: 30px;">
        <img src="logo.png" alt="MAJARDIN" style="height: 50px; filter: brightness(0) invert(1); margin-bottom: 20px;">

    </div>

            <i class="fab fa-whatsapp"></i>

    <div style="margin-top: 20px; font-size: 1rem; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;">
        <p style="margin-bottom: 10px;"><i class="fas fa-phone-alt" style="color: #B5D51E; margin-right: 10px;"></i> 06 12 26 79 66</p>

</footer>

            document.getElementById('mainNav').classList.toggle('active');

</body>
